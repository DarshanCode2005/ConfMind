[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
    ".git",
    ".husky",
    "__pycache__",
    "node_modules",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (unused imports, undefined names)
    "I",   # isort (import ordering)
    "B",   # flake8-bugbear (common bugs & design issues)
    "UP",  # pyupgrade (modernise Python syntax)
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["agents", "tools", "memory", "models"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"        # "strict" is too aggressive for a hackathon
include = ["backend", "scraping"]
exclude = ["node_modules", ".venv", "venv", "__pycache__"]
reportMissingImports = true
reportMissingTypeStubs = false    # 3rd-party libs (LangChain etc.) lack stubs — suppress noise
reportUnusedVariable = "warning"
reportUnusedImport = "warning"
